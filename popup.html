<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Toggle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
}

    body {
            width: 220px;
      padding: 20px 16px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
            user-select: none;
}

    .header {
            text-align: center;
      margin-bottom: 18px;
}

    .header .moon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
    }

    .header h1 {
            font-size: 13px;
      font-weight: 600;
      color: #a0aec0;
            letter-spacing: 1.5px;
      text-transform: uppercase;
}

    .card {
            background: #1a1a2e;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #2d2d4e;
      transition: border-color 0.3s;
}

    .card.active {
      border-color: #7c3aed;
      box-shadow: 0 0 12px rgba(124, 58, 237, 0.25);
    }

    .card-label {
            display: flex;
      flex-direction: column;
      gap: 2px;
}

    .card-label .title {
      font-size: 15px;
      font-weight: 700;
      color: #f7fafc;
      }

    .card-label .subtitle {
      font-size: 11px;
      color: #718096;
      transition: color 0.3s;
    }

    .card.active .card-label .subtitle {
      color: #9f7aea;
    }

    .toggle-wrapper {
            position: relative;
      width: 50px;
      height: 26px;
      flex-shrink: 0;
}

    .toggle-wrapper input {
            opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
}

    .slider {
            position: absolute;
      inset: 0;
      background: #4a5568;
      border-radius: 26px;
      cursor: pointer;
      transition: background 0.3s;
}

    .slider::before {
            content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      background: #ffffff;
            border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

    input:checked + .slider {
            background: #7c3aed;
    }

    input:checked + .slider::before {
            transform: translateX(24px);
}

    .footer {
            margin-top: 14px;
      text-align: center;
      font-size: 10px;
      color: #4a5568;
}
  </style>
    </head>
    <body>
      <div class="header">
        <span class="moon" id="icon">&#127769;</span>
        <h1>Dark Mode</h1>
      </div>

      <div class="card" id="card">
        <div class="card-label">
          <span class="title" id="stateLabel">Off</span>
          <span class="subtitle" id="stateDesc">Disabled on all pages</span>
        </div>
        <label class="toggle-wrapper">
          <input type="checkbox" id="toggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="footer">Affects all open tabs</div>

      <script src="popup.js"></script>
    </body>
    </html>
